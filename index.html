<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EquipRent Ethiopia — Ethiopia's #1 Construction Equipment Rental Platform" />
    <meta name="theme-color" content="#E8650A" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="https://unpkg.com/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>

    <title>EquipRent Ethiopia</title>

    <!-- Prevent flash of wrong theme -->
    <script>
      (function () {
        var theme = localStorage.getItem('equiprent-theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
